<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIFA World Cup 2026 | Stiamo tornando!</title>
    <meta name="description" content="Il conto alla rovescia per la FIFA World Cup 2026. Canada, Messico e USA ci aspettano!">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="container">
        <div class="logo-container">
            <img src="nuovo-logo-mondiali-2026-nss-cover1.png.webp" alt="FIFA World Cup 2026 Logo" id="wc-logo">
        </div>

        <h1>WM2026</h1>

        <div class="countdown" id="countdown">
            <div class="countdown-item">
                <span class="number" id="days">00</span>
                <span class="label">Giorni</span>
            </div>
            <div class="countdown-item">
                <span class="number" id="hours">00</span>
                <span class="label">Ore</span>
            </div>
            <div class="countdown-item">
                <span class="number" id="minutes">00</span>
                <span class="label">Minuti</span>
            </div>
            <div class="countdown-item">
                <span class="number" id="seconds">00</span>
                <span class="label">Secondi</span>
            </div>
        </div>

        <p class="start-date">Inizio: 11 Giugno 2026, ore 21:00</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
